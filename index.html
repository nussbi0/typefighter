<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <title>Type Fighter</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Cinzel:wght@500;700;900&family=Cinzel+Decorative:wght@700;900&family=EB+Garamond:ital,wght@0,400;0,500;0,700;1,400&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <div id="app">
      <header class="topbar">
        <div class="brand-lockup">
          <img class="brand-icon" src="/favicon.svg" alt="" width="40" height="40" />
          <h1 class="brand with-drop-cap" data-i18n="title"></h1>
        </div>
        <div class="topbar-actions">
          <button
            class="stats-button"
            id="howto-button"
            type="button"
            data-i18n="howto_button"
          ></button>
          <button
            class="stats-button"
            id="stats-button"
            type="button"
            data-i18n="stats_button"
          ></button>
          <button
            class="stats-button"
            id="leaderboard-button"
            type="button"
            data-i18n="leaderboard_button"
          ></button>
          <button
            class="stats-button"
            id="sound-button"
            type="button"
            aria-pressed="false"
          ></button>
          <div class="lang-switcher" role="group" aria-label="Language / Sprache">
            <button data-locale="en" type="button" aria-label="English" aria-pressed="false">
              EN
            </button>
            <button data-locale="de" type="button" aria-label="Deutsch" aria-pressed="false">
              DE
            </button>
          </div>
        </div>
      </header>
      <main id="scene"></main>
      <div
        id="sr-announcer"
        class="sr-only"
        role="status"
        aria-live="polite"
        aria-atomic="true"
      ></div>
    </div>
    <dialog id="howto-modal" class="stats-modal howto-modal" aria-labelledby="howto-modal-title">
      <div class="modal-card howto-card">
        <span class="corner corner-tl" aria-hidden="true"></span>
        <span class="corner corner-tr" aria-hidden="true"></span>
        <span class="corner corner-bl" aria-hidden="true"></span>
        <span class="corner corner-br" aria-hidden="true"></span>
        <h2 id="howto-modal-title" class="modal-title with-drop-cap" data-i18n="title"></h2>
        <p class="howto-tagline" data-i18n="howto_tagline"></p>
        <p class="howto-premise" data-i18n="howto_premise"></p>
        <ul class="howto-list">
          <li data-i18n="howto_p1"></li>
          <li data-i18n="howto_p2"></li>
          <li data-i18n="howto_p3"></li>
          <li data-i18n="howto_p4"></li>
          <li data-i18n="howto_p5"></li>
          <li data-i18n="howto_p6"></li>
          <li data-i18n="howto_p7"></li>
          <li data-i18n="howto_p8"></li>
          <li data-i18n="howto_p9"></li>
          <li data-i18n="howto_p10"></li>
        </ul>
        <h3 class="howto-subtitle" data-i18n="howto_abilities_title"></h3>
        <ul class="howto-list">
          <li data-i18n="ability_armor_tip"></li>
          <li data-i18n="ability_regen_tip"></li>
          <li data-i18n="ability_lifesteal_tip"></li>
          <li data-i18n="ability_poison_tip"></li>
          <li data-i18n="ability_scramble_tip"></li>
          <li data-i18n="ability_fog_tip"></li>
          <li data-i18n="ability_mirror_tip"></li>
        </ul>
        <h3 class="howto-subtitle" data-i18n="howto_arcane_title"></h3>
        <ul class="howto-list">
          <li data-i18n="arcane_flame"></li>
          <li data-i18n="arcane_ward"></li>
          <li data-i18n="arcane_cursed"></li>
        </ul>
        <button class="begin-fight howto-close" type="button" data-i18n="howto_begin"></button>
      </div>
    </dialog>
    <dialog id="stats-modal" class="stats-modal" aria-labelledby="stats-modal-title">
      <div class="modal-card">
        <span class="corner corner-tl" aria-hidden="true"></span>
        <span class="corner corner-tr" aria-hidden="true"></span>
        <span class="corner corner-bl" aria-hidden="true"></span>
        <span class="corner corner-br" aria-hidden="true"></span>
        <h2 id="stats-modal-title" class="modal-title with-drop-cap" data-i18n="stats_title"></h2>
        <div id="stats-content" class="stats-content"></div>
        <button class="modal-close begin-fight" type="button" data-i18n="stats_close"></button>
      </div>
    </dialog>
    <dialog id="leaderboard-modal" class="stats-modal" aria-labelledby="leaderboard-modal-title">
      <div class="modal-card">
        <span class="corner corner-tl" aria-hidden="true"></span>
        <span class="corner corner-tr" aria-hidden="true"></span>
        <span class="corner corner-bl" aria-hidden="true"></span>
        <span class="corner corner-br" aria-hidden="true"></span>
        <h2
          id="leaderboard-modal-title"
          class="modal-title with-drop-cap"
          data-i18n="leaderboard_title"
        ></h2>
        <div id="leaderboard-content" class="stats-content"></div>
        <button
          class="modal-close begin-fight"
          type="button"
          data-i18n="stats_close"
          data-lb-close
        ></button>
      </div>
    </dialog>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
